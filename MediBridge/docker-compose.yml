version: "3"
services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/medibridge
      - JWT_SECRET=your-secret-key-change-this-in-production
      - JWT_EXPIRES_IN=7d
  frontend:
    build: .
    ports:
      - "5173:5173"
    depends_on:
      - backend